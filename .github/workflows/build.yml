name: Build Overlay DEX & Obfuscate Assets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # Build APK di dalam folder overlay-dex
      - name: Build Debug APK
        working-directory: ./overlay-dex
        run: gradle assembleDebug

      # Ekstrak DEX dan siapkan folder output di Root
      - name: Extract DEX via d8
        run: |
          mkdir -p output_artifact/heroes
          D8=$ANDROID_SDK_ROOT/build-tools/33.0.2/d8

          # Collect .class files dari module overlay-dex
          find overlay-dex/app/build/intermediates/javac/debug -name "*.class" > /tmp/class_list.txt
          
          # d8 compile ke single DEX
          $D8 --output output_artifact/ --min-api 21 $(cat /tmp/class_list.txt)
          mv output_artifact/classes.dex output_artifact/classes2.dex

          # Copy inject.smali dan README
          cp overlay-dex/smali/inject.smali output_artifact/inject.smali
          cp overlay-dex/smali/README.md output_artifact/README.md

      # Enkripsi PNG ke BIN
      - name: Obfuscate PNG to BIN
        run: |
          python3 -c "
          import os
          key = 0x5B # KUNCI RAHASIA (Sama dengan yang di RadarView.java)
          hero_dir = 'heroes' # Baca folder heroes di root repo
          out_dir = 'output_artifact/heroes' # Simpan ke folder artifact
          
          if os.path.exists(hero_dir):
              for f in os.listdir(hero_dir):
                  if f.endswith('.png'):
                      with open(os.path.join(hero_dir, f), 'rb') as inf:
                          data = bytearray(inf.read())
                      
                      # Enkripsi byte per byte dengan XOR
                      for i in range(len(data)):
                          data[i] ^= key
                          
                      out_name = f.replace('.png', '.bin')
                      with open(os.path.join(out_dir, out_name), 'wb') as outf:
                          outf.write(data)
              print('Berhasil Obfuscate semua gambar PNG ke BIN!')
          else:
              print('WARNING: Folder heroes tidak ditemukan di root!')
          "

      # Upload hasil akhir
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: overlay-dex-build-${{ github.run_number }}
          path: output_artifact/